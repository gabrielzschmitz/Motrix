name: Build macOS

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ensure Xcode tools
        run: |
          xcode-select --install || true
          xcode-select -p

      - name: Generate project files
        run: |
          cd build
          chmod +x premake5.osx
          ./premake5.osx gmake

      - name: Build Release
        run: |
          make config=release_x64 CC=clang CXX=clang++

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: Motrix-macos
          path: bin/Release/Motrix
