<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="icon" type="image/png" href="icon.png" />

  <title>Game</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap");

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #252b3a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Orbitron", monospace;
    }

    canvas.emscripten {
      border: 3px solid #3a4256;
      border-radius: 8px;
      background: #111;
      display: block;

      width: min(95vw, 95vh * 1.3333);
      height: auto;
    }
  </style>
</head>

<body>
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1">
  </canvas>

  <script type="text/javascript">
    function resizeCanvas() {
      const canvas = document.getElementById("canvas");

      const aspect = 4 / 3;

      let w = window.innerWidth * 0.95;
      let h = window.innerHeight * 0.95;

      if (w / h > aspect) {
        w = h * aspect;
      } else {
        h = w / aspect;
      }

      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
    }

    var Module = {
      preRun: [],
      postRun: [],

      print: function (text) {
        if (arguments.length > 1) {
          text = Array.prototype.slice.call(arguments).join(" ");
        }
        console.log(text);
      },

      printErr: function (text) {
        if (arguments.length > 1) {
          text = Array.prototype.slice.call(arguments).join(" ");
        }
        console.error(text);
      },

      canvas: (function () {
        const canvas = document.getElementById("canvas");

        canvas.addEventListener(
          "webglcontextlost",
          function (e) {
            alert("WebGL context lost. Reload required.");
            e.preventDefault();
          },
          false
        );

        return canvas;
      })(),

      totalDependencies: 0,

      monitorRunDependencies: function (left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
      }
    };

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("load", resizeCanvas);
  </script>

  {{{ SCRIPT }}}
</body>

</html>
